<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{{DESCRIPTION}}">
    <link rel="canonical" href="{{CANONICAL_URL}}">
    {{ROBOTS_META}}
    <title>{{TITLE}}</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">

    <link rel="preconnect" href="https://unpkg.com" crossorigin>

    <!-- Open Graph / Social Sharing -->
    <meta property="og:title" content="{{OG_TITLE}}">
    <meta property="og:description" content="{{OG_DESCRIPTION}}">
    <meta property="og:url" content="{{OG_URL}}">
    <meta property="og:image" content="{{OG_IMAGE}}">
    <meta property="og:type" content="{{OG_TYPE}}">
    <meta property="og:site_name" content="{{OG_SITE_NAME}}">
    <meta property="og:locale" content="{{OG_LOCALE}}">

    <!-- Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{{TWITTER_TITLE}}">
    <meta name="twitter:description" content="{{TWITTER_DESCRIPTION}}">
    <meta name="twitter:image" content="{{TWITTER_IMAGE}}">
    {{JSON_LD}}

    <!-- Tailwind CSS CDN -->
    <script>
      // Extend Tailwind CDN config so Jess shadcn-style classes work
      // (bg-background, text-foreground, border-border, etc.)
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        theme: {
          extend: {
            colors: {
              background: 'var(--background)',
              foreground: 'var(--foreground)',
              card: { DEFAULT: 'var(--card)', foreground: 'var(--card-foreground)' },
              popover: { DEFAULT: 'var(--popover)', foreground: 'var(--popover-foreground)' },
              primary: { DEFAULT: 'var(--primary)', foreground: 'var(--primary-foreground)' },
              secondary: { DEFAULT: 'var(--secondary)', foreground: 'var(--secondary-foreground)' },
              muted: { DEFAULT: 'var(--muted)', foreground: 'var(--muted-foreground)' },
              accent: { DEFAULT: 'var(--accent)', foreground: 'var(--accent-foreground)' },
              destructive: { DEFAULT: 'var(--destructive)', foreground: 'var(--destructive-foreground)' },
              border: 'var(--border)',
              input: 'var(--input)',
              ring: 'var(--ring)',
            },
            borderRadius: {
              sm: 'calc(var(--radius) - 4px)',
              md: 'calc(var(--radius) - 2px)',
              lg: 'var(--radius)',
              xl: 'calc(var(--radius) + 4px)',
            },
          },
        },
      };
    </script>
    <!-- Lucide Icons CDN -->
    <script defer src="https://unpkg.com/lucide@0.487.0"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="{{CSS_PATH}}/site.css">
</head>
<body class="antialiased{{BODY_CLASS}}">
    <main>
    {{BODY_HTML}}
    </main>

    <!-- Scripts -->
    <script defer src="{{JS_PATH}}/main.js"></script>{{FORM_JS_TAG}}
</body>
</html>
